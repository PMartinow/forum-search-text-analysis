<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Forum Inspector{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #0b1224;
        --panel: #0f172a;
        --accent: #06b6d4;
        --accent-2: #10b981;
        --muted: #9ca3af;
        --text: #e5e7eb;
        --border: #1e283a;
        --card: #0b1324;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Space Grotesk', 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at 20% 20%, rgba(6,182,212,0.12), rgba(16,185,129,0)) ,
                    radial-gradient(circle at 80% 10%, rgba(16,185,129,0.12), rgba(6,182,212,0));
        background-color: var(--bg);
        color: var(--text);
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { color: #67e8f9; }
      .shell { max-width: 1200px; margin: 0 auto; padding: 24px 20px 48px; }
      header.topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        backdrop-filter: blur(8px);
        background: rgba(15,23,42,0.92);
        border-bottom: 1px solid var(--border);
      }
      header .bar {
        max-width: 1100px;
        margin: 0 auto;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .brand {
        font-weight: 700;
        letter-spacing: 0.4px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand-badge {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #0b1120;
        font-weight: 700;
        border-radius: 12px;
        padding: 6px 10px;
        font-size: 12px;
      }
      nav a {
        color: var(--muted);
        font-weight: 600;
        margin-left: 16px;
      }
      nav a:hover { color: var(--text); }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.35);
      }
      .button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #0b1120;
        border-radius: 12px;
        padding: 10px 14px;
        border: none;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 6px 20px rgba(6,182,212,0.2);
      }
      .button.secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        box-shadow: none;
      }
      .chips {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        font-size: 12px;
        color: var(--muted);
      }
      .chip.good {
        color: #bbf7d0;
        border-color: rgba(16,185,129,0.5);
        background: rgba(16,185,129,0.08);
      }
      .chip.badge {
        color: #67e8f9;
        border-color: rgba(6,182,212,0.4);
        background: rgba(6,182,212,0.08);
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        transition: border-color 120ms ease, transform 120ms ease;
      }
      .card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .muted { color: var(--muted); }
      .stack { display: flex; flex-direction: column; gap: 14px; }
      .workspace {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 16px;
        align-items: start;
      }
      @media (max-width: 1024px) { .workspace { grid-template-columns: 1fr; } }
      .small-button {
        border-radius: 10px;
        padding: 8px 12px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        font-weight: 600;
      }
      .small-button:hover {
        border-color: var(--accent);
        color: #67e8f9;
      }
      .section {
        margin-top: 18px;
      }
      .comment {
        white-space: pre-wrap;
        line-height: 1.55;
      }
      .badge-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      details.snippet-toggle {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px;
        background: var(--card);
      }
      details.snippet-toggle summary {
        cursor: pointer;
        font-weight: 700;
        color: var(--text);
        list-style: none;
      }
      details.snippet-toggle summary::-webkit-details-marker { display: none; }
      details.snippet-toggle[open] {
        border-color: var(--accent);
      }
      .table {
        width: 100%;
        border-collapse: collapse;
      }
      .table th, .table td {
        text-align: left;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      .table th {
        color: var(--muted);
        font-weight: 600;
        width: 180px;
      }
      .pill {
        padding: 6px 10px;
        border-radius: 999px;
        font-weight: 600;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--border);
      }
      .pill.ok {
        color: #22d3ee;
        border-color: rgba(34,211,238,0.5);
        background: rgba(34,211,238,0.08);
      }
      .pill.fail {
        color: #fda4af;
        border-color: rgba(248,113,113,0.4);
        background: rgba(248,113,113,0.08);
      }
      .pill.neutral {
        color: var(--muted);
        background: rgba(255,255,255,0.02);
      }
      .hero {
        margin-bottom: 18px;
      }
      .hero h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: -0.3px;
      }
      .hero p { margin: 0; color: var(--muted); }
      .search-box {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin-top: 10px;
        align-items: center;
      }
      .filter-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
        margin-top: 10px;
        align-items: center;
      }
      input[type="text"], input[type="date"] {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text);
        min-height: 44px;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 15px;
      }
      input[type="text"]:focus,
      input[type="date"]:focus {
        outline: 2px solid rgba(6,182,212,0.4);
        border-color: var(--accent);
      }
      mark {
        background: rgba(6,182,212,0.18);
        color: var(--text);
      }
      .workspace-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        gap: 8px;
      }
      .pill {
        padding: 6px 10px;
        border-radius: 999px;
        font-weight: 600;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--border);
      }
      .pill.ok { color: #22d3ee; border-color: rgba(34,211,238,0.5); background: rgba(34,211,238,0.08); }
      .pill.fail { color: #fda4af; border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.08); }
      .pill.neutral { color: var(--muted); background: rgba(255,255,255,0.02); }
      .card-evidence {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        display: block;
        color: inherit;
        text-decoration: none;
        transition: border-color 120ms ease, transform 120ms ease;
      }
      .card-evidence:hover { border-color: var(--accent); transform: translateY(-2px); }
      .alert {
        border: 1px solid rgba(248,113,113,0.5);
        background: rgba(248,113,113,0.08);
        color: #fecdd3;
        border-radius: 12px;
        padding: 12px;
        font-size: 14px;
      }
      .timeline {
        display: flex;
        gap: 6px;
        align-items: flex-end;
        min-height: 120px;
        margin-top: 10px;
        padding: 10px;
        border-radius: 12px;
        background: var(--card);
        border: 1px solid var(--border);
        overflow-x: auto;
      }
      .timeline-bar {
        width: 10px;
        background: linear-gradient(180deg, rgba(6,182,212,0.2), rgba(6,182,212,0.9));
        border-radius: 6px;
        position: relative;
      }
      .timeline-bar:hover::after {
        content: attr(data-label);
        position: absolute;
        top: -24px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 4px 6px;
        border-radius: 6px;
        color: var(--text);
        white-space: nowrap;
        font-size: 11px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      }
      footer {
        margin-top: 28px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="bar">
        <div class="brand">
          <span class="brand-badge">SQLite</span>
          <span>Forum Inspector</span>
        </div>
        <nav>
          <a href="{{ url_for('index') }}">Browse</a>
          <a href="{{ url_for('labels_preview') }}">Embeddings & Labels</a>
        </nav>
      </div>
    </header>
    <div class="shell">
      {% block content %}{% endblock %}
      <footer>Viewing data from {{ DATABASE_PATH or 'data/forum_data.db' }}</footer>
    </div>
  </body>
</html>
